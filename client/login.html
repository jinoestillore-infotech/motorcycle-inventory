<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MotoStock Inventory</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }
        .auth-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        .auth-image-bg {
            background-image: url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100%;
        }
        .auth-form-container {
            padding: 3rem;
            background-color: #ffffff;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: bold;
            color: #212529;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .brand-logo i {
            color: #0d6efd;
        }
        .form-floating:focus-within label {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card mx-auto">
        <div class="row g-0">
            <!-- Left Side: Image (Hidden on small screens) -->
            <div class="col-md-5 d-none d-md-block auth-image-bg">
            </div>
            
            <!-- Right Side: Login Form -->
            <div class="col-md-7 auth-form-container">
                <div class="text-center text-md-start">
                    <a href="#" class="brand-logo">
                        <i class="bi bi-gear-wide-connected"></i> MotoStock
                    </a>
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-muted mb-4">Log in to manage your inventory.</p>
                </div>

                <!-- Error/Success Message Placeholder -->
                <div id="messageBox" class="alert d-none" role="alert"></div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email Input -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        <label for="emailInput"><i class="bi bi-envelope me-2"></i>Email address</label>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="form-floating mb-4">
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required>
                        <label for="passwordInput"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid mb-4">
                        <button class="btn btn-primary btn-lg" type="submit">Log In</button>
                    </div>

                    <!-- Link to Register -->
                    <div class="text-center text-muted">
                        Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-bold">Register here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function handleLogin(event) {
        event.preventDefault(); // Prevent actual form submission
        
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const messageBox = document.getElementById('messageBox');

        // Reset message box
        messageBox.classList.remove('d-none', 'alert-success', 'alert-danger');

        try {
            // Send login credentials to your Node.js backend
            const response = await fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                messageBox.classList.add('alert-success');
                messageBox.innerText = "Login successful! Redirecting to Dashboard...";
                messageBox.classList.remove('d-none');

                // Store user context temporarily in localStorage (simulating basic auth flow)
                localStorage.setItem('user', JSON.stringify(data.user));

                // Redirect to dashboard page after 1.5 seconds
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                // If backend returns an error (e.g., Invalid credentials)
                messageBox.classList.add('alert-danger');
                messageBox.innerText = data.message || "Invalid credentials. Please try again.";
                messageBox.classList.remove('d-none');
            }
        } catch (error) {
            console.error('Login error:', error);
            messageBox.classList.add('alert-danger');
            messageBox.innerText = "Cannot connect to server. Ensure Node is running on port 3000.";
            messageBox.classList.remove('d-none');
        }
    }
</script>
</body>
</html>
