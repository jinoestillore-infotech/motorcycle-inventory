<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MotoStock Inventory</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
        }
        .auth-image-bg {
            /* Using a high-quality placeholder for a motorcycle shop theme */
            background-image: url('https://images.unsplash.com/photo-1558981403-c5f9899a28bc?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            min-height: 100%;
        }
        .auth-form-container {
            padding: 3rem;
            background-color: #ffffff;
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: bold;
            color: #212529;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 2rem;
        }
        .brand-logo i {
            color: #0d6efd;
        }
        .form-floating:focus-within label {
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card auth-card mx-auto">
        <div class="row g-0">
            <!-- Left Side: Image (Hidden on small screens) -->
            <div class="col-md-5 d-none d-md-block auth-image-bg">
                <!-- Image is handled via CSS background -->
            </div>
            
            <!-- Right Side: Login Form -->
            <div class="col-md-7 auth-form-container">
                <div class="text-center text-md-start">
                    <a href="#" class="brand-logo">
                        <i class="bi bi-gear-wide-connected"></i> MotoStock
                    </a>
                    <h3 class="fw-bold mb-1">Welcome Back</h3>
                    <p class="text-muted mb-4">Please log in to your account to manage inventory.</p>
                </div>

                <!-- Error Message Placeholder (Hidden by default) -->
                <div id="errorMessage" class="alert alert-danger d-none" role="alert">
                    Invalid email or password.
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <!-- Email Input -->
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="emailInput" placeholder="name@example.com" required>
                        <label for="emailInput"><i class="bi bi-envelope me-2"></i>Email address</label>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="passwordInput" placeholder="Password" required>
                        <label for="passwordInput"><i class="bi bi-lock me-2"></i>Password</label>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                            <label class="form-check-label text-muted" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none text-primary small">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid mb-4">
                        <button class="btn btn-primary btn-lg" type="submit">Log In</button>
                    </div>

                    <!-- Link to Register -->
                    <div class="text-center text-muted">
                        Don't have an account? <a href="register.html" class="text-primary text-decoration-none fw-bold">Register here</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function handleLogin(event) {
        event.preventDefault(); // Prevent actual form submission for now
        
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const errorBox = document.getElementById('errorMessage');

        // Basic front-end simulation (Later, this is where you'll use fetch() to talk to Node.js)
        if (email && password) {
            // Hide error if it was shown
            errorBox.classList.add('d-none');
            
            // Simulate successful login and redirect to dashboard
            // In the future, your Node server will verify credentials before this happens
            window.location.href = 'index.html'; 
        } else {
            // Show error message
            errorBox.classList.remove('d-none');
            errorBox.innerText = "Please fill in all fields.";
        }
    }
</script>
</body>
</html>
